version: '3.8'

services:
  # Stage 1: ТОЛЬКО PostgreSQL (Redis добавляем на Stage 2)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Для продакшена Stage 1 добавьте:
    # restart: always
    # healthcheck: ...

volumes:
  postgres_data: